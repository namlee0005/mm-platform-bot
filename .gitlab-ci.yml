stages:
  - build
  - docker

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  GOPATH: $CI_PROJECT_DIR/.go-cache

# Build Go binary on runner (with module cache)
build-binary:
  stage: build
  image: golang:1.25
  timeout: 2h
  cache:
    key:
      files:
        - go.sum
    paths:
      - .go-cache/pkg/mod
      - .go-cache/cache/go-build
    policy: pull-push
  before_script:
    - export GOMODCACHE=$GOPATH/pkg/mod
    - export GOCACHE=$GOPATH/cache/go-build
  script:
    - CGO_ENABLED=0 GOOS=linux go build -o mm-bot ./cmd/main.go
  artifacts:
    paths:
      - mm-bot
    expire_in: 1 hour
  only:
    - main
    - develop
    - tags

# Build and push Docker image (just copies pre-built binary)
build-docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME -t $IMAGE_LATEST .
    - docker push $IMAGE_NAME
    - docker push $IMAGE_LATEST
  only:
    - main
    - develop
    - tags