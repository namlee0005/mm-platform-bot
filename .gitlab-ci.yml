stages:
  - build
  - docker

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  GOMODCACHE: $CI_PROJECT_DIR/.cache/gomod
  GOCACHE: $CI_PROJECT_DIR/.cache/go-build

build-binary:
  stage: build
  image: golang:1.25
  timeout: 2h
  cache:
    key:
      files:
        - go.sum
    paths:
      - .cache/gomod
      - .cache/go-build
    policy: pull-push
  script:
    - go env
    - go mod download
    - CGO_ENABLED=0 GOOS=linux go build -v -o mm-bot ./cmd/main.go
  artifacts:
    paths:
      - mm-bot
    expire_in: 1 hour
  only:
    - main
    - develop
    - tags

build-docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_NAME -t $IMAGE_LATEST .
    - docker push $IMAGE_NAME
    - docker push $IMAGE_LATEST
  only:
    - main
    - develop
    - tags