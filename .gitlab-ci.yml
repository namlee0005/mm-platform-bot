stages:
  - build
  - docker

variables:
  IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  GOMODCACHE: $CI_PROJECT_DIR/.cache/gomod
  GOCACHE: $CI_PROJECT_DIR/.cache/go-build
  GOMAXPROCS: "1"
  GOFLAGS: "-p=1"

build-binary:
  stage: build
  image: golang:1.25
  timeout: 2h

  cache:
    key:
      files:
        - go.sum
    paths:
      - .cache/gomod
      - .cache/go-build
    policy: pull-push

  script:
    - echo "=== GO ENV ==="
    - go version
    - go env

    - echo "=== SYSTEM INFO ==="
    - uname -a || true
    - nproc || true
    - free -m || true
    - df -h || true

    - echo "=== DOWNLOAD ==="
    - time go mod download

    - echo "=== BUILD START ==="
    - |
      env CGO_ENABLED=0 GOOS=linux go build -x -work -v -o mm-bot ./cmd/main.go &
      BUILD_PID=$!
      echo "BUILD_PID=$BUILD_PID"

      while kill -0 "$BUILD_PID" 2>/dev/null; do
        echo "[heartbeat] $(date -Iseconds) build still running..."
        echo "--- ps ---"
        ps -o pid,ppid,stat,%cpu,%mem,etime,cmd -p "$BUILD_PID" --forest || true
        pgrep -P "$BUILD_PID" | xargs -r ps -o pid,ppid,stat,%cpu,%mem,etime,cmd -p || true
        echo "--- memory ---"
        free -m || true
        echo "--- disk ---"
        df -h || true
        echo "--- load ---"
        cat /proc/loadavg || true
        sleep 30
      done

      wait "$BUILD_PID"
      BUILD_EXIT=$?
      echo "BUILD_EXIT=$BUILD_EXIT"
      exit "$BUILD_EXIT"

  after_script:
    - echo "=== AFTER SCRIPT ==="
    - ls -lah || true
    - ls -lah .cache || true
    - ls -lah .cache/gomod | head -50 || true
    - ls -lah .cache/go-build | head -50 || true
    - test -f mm-bot && ls -lah mm-bot || true

  artifacts:
    paths:
      - mm-bot
    expire_in: 1 hour

  only:
    - main
    - develop
    - tags

build-docker:
  stage: docker
  image: docker:24
  services:
    - docker:24-dind

  needs:
    - job: build-binary
      artifacts: true

  variables:
    DOCKER_TLS_CERTDIR: "/certs"

  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

  script:
    - ls -lah
    - test -f mm-bot
    - docker build -t "$IMAGE_NAME" -t "$IMAGE_LATEST" .
    - docker push "$IMAGE_NAME"
    - docker push "$IMAGE_LATEST"

  only:
    - main
    - develop
    - tags